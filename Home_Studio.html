<!DOCTYPE html>
<html lang="zh-TW">
	<head>
		<title>three.js PathTracing Renderer - Home Studio</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1">
		<link rel="icon" href="data:,">
		<link href="css/default.css?v=r7310-floor-side-edge-fix-v1" rel="stylesheet"/>

		<script type="importmap">
		{
			"imports": {
				"three": "./js/three.module.min.js"
			}
		}
		</script>

		<script type="module">
			import * as THREE from 'three';
			window.THREE = THREE;
			import Stats from './js/stats.module.js';
			window.Stats = Stats;
		</script>
	</head>

	<body>
		<div id="info" style="display:none;">three.js PathTracing Renderer - Home Studio</div>

		<div id="container"> </div>

		<!-- Loading screen -->
		<div id="loading-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:#0c0c0c; z-index:9999; display:flex; align-items:center; justify-content:center; transition:opacity 0.5s ease;">
			<div style="position:relative; width:80px; height:80px; display:flex; align-items:center; justify-content:center;">
				<svg width="80" height="80" style="position:absolute; top:0; left:0;">
					<circle stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="transparent" r="36" cx="40" cy="40"/>
					<circle id="loading-ring" stroke="#8c8273" stroke-width="4" stroke-dasharray="226" stroke-dashoffset="226" stroke-linecap="round" fill="transparent" r="36" cx="40" cy="40" style="transition:stroke-dashoffset 0.1s; transform:rotate(-90deg); transform-origin:50% 50%;"/>
				</svg>
				<span id="loading-text" style="color:#d3d3d1; font-size:12px; font-weight:normal; letter-spacing:0.5px;">0%</span>
			</div>
		</div>

		<!-- Info panel (bottom-left, R4-5 will bind live data) -->
		<div id="info-panel" style="display:none;">
			<div style="color:#aaa;">FPS: <span id="fps-counter">0</span></div>
			<div style="color:#aaa;">累計採樣: <span id="sample-counter">0</span></div>
		</div>

		<div id="snapshot-controls">
			<div id="floor-roughness-actions" class="snapshot-action-roughness">
				<div id="slider-floor-roughness"></div>
			</div>
			<div id="r7310-full-floor-actions" class="r7310-full-floor-actions">
				<button id="btn-r7310-floor-diffuse" class="snapshot-action-btn glow-white">地板烘焙：開</button>
				<button id="btn-r7310-north-wall-diffuse" class="snapshot-action-btn glow-white">北牆烘焙：開</button>
				<button id="btn-r7310-east-wall-diffuse" class="snapshot-action-btn glow-white">東牆烘焙：開</button>
				<button id="btn-r7310-west-wall-diffuse" class="snapshot-action-btn glow-white">西牆烘焙：開</button>
				<button id="btn-r7310-south-wall-diffuse" class="snapshot-action-btn glow-white">南牆烘焙：開</button>
				<button id="btn-r7310-ceiling-diffuse" class="snapshot-action-btn glow-white">天花板烘焙：開</button>
			</div>
			<div id="snapshot-bar"></div>
			<div id="snapshot-actions">
				<button class="snapshot-action-btn" id="btn-toggle-snapshots">快照：關</button>
				<button class="snapshot-action-btn" id="btn-manual-capture">📸 手動存圖</button>
				<button class="snapshot-action-btn" id="btn-toggle-sampling">暫停採樣</button>
				<button class="snapshot-action-btn" id="btn-step-back-sampling">上一個採樣</button>
				<button class="snapshot-action-btn" id="btn-step-sampling">下一個採樣</button>
				<label class="snapshot-action-spp-cap" for="input-spp-cap">
					<span>SPP 上限</span>
					<input type="number" id="input-spp-cap" min="1" step="1" value="1000">
				</label>
			</div>
		</div>
		<img id="snapshot-preview" src="" alt="snapshot">

		<!-- Camera buttons (top-right) -->
		<div id="top-right-group" class="panel-group" style="position:fixed; top:15px; right:15px; z-index:20; padding:4px; gap:4px; flex-direction:column;">
			<button id="btnCam1" class="cam-btn">視角 1</button>
			<button id="btnCam2" class="cam-btn">視角 2</button>
			<button id="btnCam3" class="cam-btn">視角 3</button>
		</div>

		<!-- Help + Hide (bottom-right) -->
		<div id="bottom-right-group" style="position:fixed; bottom:15px; right:15px; z-index:20; display:flex; align-items:flex-end; gap:8px;">
			<div id="help-wrapper">
				<div id="help-btn">?</div>
				<div id="instructions">
					[PC] W,A,S,D 移動 | E 上升 | C 下降<br>
					[Mouse] 左鍵鎖定視角 | 滾輪縮放 | 右鍵拖曳平移<br>
					[Mobile] 左半邊拖曳移動 | 右半邊滑動轉角<br>
					💡 CMD/CTRL + 點擊滑桿可重置數值
				</div>
			</div>
			<div id="lock-btn" title="鎖定 UI（防止誤觸重新累積）">
				<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
					<rect x="5" y="11" width="14" height="10" rx="2"/>
					<path d="M8 11V7a4 4 0 0 1 8 0v4"/>
				</svg>
			</div>
			<div id="hide-btn" title="隱藏 UI">
				<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
					<path d="M2 12c.94-3.46 4.35-6 8-6s7.06 2.54 8 6c-.94 3.46-4.35 6-8 6s-7.06-2.54-8-6Z"></path>
					<circle cx="12" cy="12" r="3"></circle>
				</svg>
			</div>
		</div>

		<!-- Main UI container -->
		<div id="ui-container">
			<div class="panel-group">

				<!-- 🔧 配置 -->
				<div id="config-header" class="panel-header item-divider">🔧 配置</div>
				<div id="config-panel" class="panel-content">
					<div class="config-radio-group">
						<label class="config-radio">
							<input type="radio" name="panelConfig" value="1" id="btnConfig1" checked>
							<span class="config-radio-label">1</span>
						</label>
						<label class="config-radio">
							<input type="radio" name="panelConfig" value="2" id="btnConfig2">
							<span class="config-radio-label">2</span>
						</label>
						<label class="config-radio">
							<input type="radio" name="panelConfig" value="3" id="btnConfig3">
							<span class="config-radio-label">3</span>
						</label>
						<label class="config-radio">
							<input type="radio" name="panelConfig" value="4" id="btnConfig4">
							<span class="config-radio-label">4</span>
						</label>
					</div>
					<div id="config-desc" class="config-description">吸頂燈 + 牆面吸音板</div>
				</div>


					<!-- 💡 燈光設定 -->
				<div id="light-header" class="panel-header item-divider">💡 燈光設定</div>
				<div id="light-panel" class="panel-content collapsed">


					<!-- Cloud -->
					<div id="cloud-section" class="light-section">
					<div class="control-row" style="margin-bottom:8px;">
						<div class="label-group"><input type="checkbox" id="chkCloud" checked><span class="label-text">Cloud 漫射燈</span></div>
					</div>
					<div class="sub-panel">
						<div style="display:flex; gap:4px; margin-bottom:12px;" id="groupCloudColor">
							<button class="action-btn" data-val="WARM">暖光 3000K</button>
							<button class="action-btn glow-white" data-val="NEUTRAL">自然 4000K</button>
							<button class="action-btn" data-val="COLD">白光 6500K</button>
						</div>
						<div id="slider-lumens"></div>
					</div>
					</div>

					<!-- Track -->
					<div id="track-section" class="light-section">
						<div class="item-divider" style="margin:12px 0;"></div>
					<div class="control-row" style="margin-bottom:8px;">
						<div class="label-group"><input type="checkbox" id="chkTrack" checked><span class="label-text">軌道燈</span></div>
					</div>
					<div class="sub-panel">
						<div style="margin-bottom:6px; color:#aaa; font-size:10px;">外觀顏色</div>
						<div style="display:flex; gap:4px; margin-bottom:12px;" id="groupTrackMeshColor">
							<button class="action-btn" data-val="BLACK">黑色</button>
							<button class="action-btn glow-white" data-val="WHITE">白色</button>
						</div>
						<div style="margin-bottom:6px; color:#aaa; font-size:10px;">色溫設定</div>
						<div style="display:flex; gap:4px; margin-bottom:12px;" id="groupTrackColor">
							<button class="action-btn" data-val="ALL_WARM">全暖 3000K</button>
							<button class="action-btn" data-val="ALL_COLD">全冷 6000K</button>
							<button class="action-btn glow-gradient-ob" data-val="WARM_COLD">北暖/南冷</button>
							<button class="action-btn" data-val="COLD_WARM">北冷/南暖</button>
						</div>
						<div id="slider-track-lumens"></div>
						<div id="slider-track-beam-inner"></div>
						<div id="slider-track-beam-outer"></div>
						<div id="slider-track-tilt"></div>
						<div id="slider-track-space"></div>
						<div id="slider-track-x"></div>
					</div>
					</div>

					<!-- Wide -->
					<div id="wide-section" class="light-section">
						<div class="item-divider" style="margin:12px 0;"></div>
					<div class="control-row" style="margin-bottom:8px;">
						<div class="label-group"><span class="label-text">廣角燈</span></div>
					</div>
					<div class="sub-panel">
						<div style="display:flex; gap:12px; margin-bottom:12px;">
							<label style="display:flex; align-items:center; gap:4px; color:#aaa; font-size:10px; cursor:pointer;">
								<input type="checkbox" id="chkTrackWideSouth" checked> 南側電源
							</label>
							<label style="display:flex; align-items:center; gap:4px; color:#aaa; font-size:10px; cursor:pointer;">
								<input type="checkbox" id="chkTrackWideNorth" checked> 北側電源
							</label>
						</div>
						<div style="margin-bottom:6px; color:#aaa; font-size:10px;">外觀顏色</div>
						<div style="display:flex; gap:4px; margin-bottom:12px;" id="groupTrackWideMeshColor">
							<button class="action-btn" data-val="BLACK">黑色</button>
							<button class="action-btn glow-white" data-val="WHITE">白色</button>
						</div>
						<div id="ns-wide-controls">
							<div style="margin-bottom:6px; color:#aaa; font-size:10px;">南側色溫</div>
							<div style="display:flex; gap:4px; margin-bottom:8px;" id="groupTrackWideColorSouth">
								<button class="action-btn" data-val="WARM">暖光 3000K</button>
								<button class="action-btn glow-white" data-val="NEUTRAL">自然 4000K</button>
								<button class="action-btn" data-val="COLD">白光 6000K</button>
							</div>
							<div style="margin-bottom:6px; color:#aaa; font-size:10px;">北側色溫</div>
							<div style="display:flex; gap:4px; margin-bottom:12px;" id="groupTrackWideColorNorth">
								<button class="action-btn" data-val="WARM">暖光 3000K</button>
								<button class="action-btn glow-white" data-val="NEUTRAL">自然 4000K</button>
								<button class="action-btn" data-val="COLD">白光 6000K</button>
							</div>
							<div id="slider-track-wide-lumens"></div>
							<div id="slider-track-wide-beam-inner"></div>
							<div id="slider-track-wide-beam-outer"></div>
							<div id="slider-track-wide-tilt-south"></div>
							<div id="slider-track-wide-tilt-north"></div>
						</div>
						<div id="slider-track-wide-z"></div>
					</div>
					</div>
				</div>

				<!-- ⚙️ 光追設定 -->
				<div id="ray-header" class="panel-header">⚙️ 光追設定</div>
				<div id="ray-panel" class="panel-content collapsed">
					<div style="display:flex; gap:8px; margin-bottom:12px;">
						<button id="btnGroupA" class="action-btn">趨近真實</button>
						<button id="btnGroupB" class="action-btn glow-white">快速預覽</button>
					</div>
					<div id="slider-pixel-res"></div>
					<div id="slider-bounces"></div>
					<div class="item-divider" style="margin:12px 0;"></div>
					<div id="group-a-controls" style="display:none;">
						<div id="slider-mult-a"></div>
						<div id="slider-sat-a"></div>
						<div class="control-row" style="margin-bottom:8px;">
							<div class="label-group"><input type="checkbox" id="chkAces-a" checked><span class="label-text">ACES</span></div>
						</div>
						<div id="slider-aces-strength-a"></div>
						<div id="slider-aces-sat-a"></div>
						<div id="slider-exp-a"></div>
					</div>
					<div id="group-b-controls">
						<div id="slider-mult-b"></div>
						<div id="slider-borrow-strength-b"></div>
						<div id="slider-sat-b"></div>
						<div class="control-row" style="margin-bottom:8px;">
							<div class="label-group"><input type="checkbox" id="chkAces-b" checked><span class="label-text">ACES</span></div>
						</div>
						<div id="slider-aces-strength-b"></div>
						<div id="slider-aces-sat-b"></div>
						<div id="slider-exp-b"></div>
						<div class="control-row" style="margin-bottom:8px;">
							<div class="label-group"><input type="checkbox" id="chkLgg" checked><span class="label-text">LGG</span></div>
						</div>
						<div id="slider-lgg-strength"></div>
						<div id="slider-lgg-lift"></div>
						<div id="slider-lgg-gamma"></div>
						<div id="slider-lgg-gain"></div>
						<div id="slider-wb-b"></div>
						<div id="slider-hue-b"></div>
					</div>
					<div id="slider-wall-albedo"></div>
				</div>

				<!-- 🎨 吸音板色 -->
				<div id="gik-header" class="panel-header item-divider">🎨 吸音板色</div>
				<div id="gik-panel" class="panel-content collapsed">
					<div class="gik-minimap" style="margin-top: 8px;">
						<div class="gik-row" id="row-all">
							<div class="gik-label">全部</div>
							<div class="gik-blocks"><div class="gik-block" data-idx="all" data-color="0"></div></div>
						</div>
						<div class="gik-row" id="row-north">
							<div class="gik-label">北牆</div>
							<div class="gik-blocks">
								<div class="gik-block" id="blk-n3" data-idx="8" data-color="0"></div>
								<div class="gik-block" id="blk-n2" data-idx="7" data-color="0"></div>
								<div class="gik-block" id="blk-n1" data-idx="6" data-color="0"></div>
							</div>
						</div>
						<div class="gik-row" id="row-east">
							<div class="gik-label">東牆</div>
							<div class="gik-blocks">
								<div class="gik-block" id="blk-e1" data-idx="3" data-color="0"></div>
								<div class="gik-block" id="blk-e2" data-idx="4" data-color="0"></div>
								<div class="gik-block" id="blk-e3" data-idx="5" data-color="0"></div>
							</div>
						</div>
						<div class="gik-row" id="row-west">
							<div class="gik-label">西牆</div>
							<div class="gik-blocks">
								<div class="gik-block" id="blk-w1" data-idx="0" data-color="0"></div>
								<div class="gik-block" id="blk-w2" data-idx="1" data-color="0"></div>
								<div class="gik-block" id="blk-w3" data-idx="2" data-color="0"></div>
							</div>
						</div>
						<div class="gik-row" id="row-ceil">
							<div class="gik-label">天花板</div>
							<div class="gik-blocks"><div class="gik-block" data-idx="ceil" data-color="0"></div></div>
						</div>
					</div>
				</div>

			</div>
		</div>

		<div id="cameraInfo" style="position:fixed; left:15px; bottom:6px; font-family:arial; font-size:11px; color:rgb(255,255,255); text-shadow:0 0 4px #000;"></div>

		<script defer src="js/MobileJoystickControls.js"> </script>
		<script defer src="js/PathTracingCommon.js"> </script>
		<script defer src="js/BVH_Acc_Structure_Iterative_Fast_Builder.js"> </script>
		<script defer src="js/InitCommon.js?v=r7310-loading-ui-v1"> </script>

			<script defer src="js/Home_Studio.js?v=r7310-floor-side-edge-fix-v1"> </script>

	</body>
</html>
