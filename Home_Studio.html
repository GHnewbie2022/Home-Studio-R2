<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js PathTracing Renderer - Home Studio</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1">
		<link href="css/default.css" rel="stylesheet"/>

		<style>
			/* R2-18 fix34：lil-gui 巢狀資料夾視覺縮排，以 !important 壓過預設 padding:0 */
			.lil-gui .lil-gui > .title { padding-left: 20px !important; }
			.lil-gui .lil-gui .controller { padding-left: 20px !important; }
			.lil-gui .lil-gui .lil-gui > .title { padding-left: 36px !important; }
			.lil-gui .lil-gui .lil-gui .controller { padding-left: 36px !important; }
		</style>

		<script type="importmap">
		{
			"imports": {
				"three": "./js/three.module.min.js"
			}
		}
		</script>

		<script type="module">
			import * as THREE from 'three';
			window.THREE = THREE;
			import Stats from './js/stats.module.js';
			window.Stats = Stats;
			import GUI from './js/lil-gui.module.min.js';
			window.GUI = GUI;
		</script>
	</head>
	
	<body>
		
		<div id="container"> </div>
		<div id="info">three.js PathTracing Renderer - Home Studio</div>
		
		<div id="snapshot-bar" style="position:fixed; bottom:32px; left:10px; z-index:25; display:flex; gap:4px; align-items:flex-end; pointer-events:auto; flex-wrap:wrap; max-width:90vw;"></div>
		<div id="cameraInfo" style="position:fixed; left:10px; bottom:6px; font-family:arial; font-size:11px; color:rgb(255,255,255); text-shadow:0 0 4px #000;"></div>
		
		<script defer src="js/MobileJoystickControls.js"> </script>
		<script defer src="js/PathTracingCommon.js"> </script>
		<script defer src="js/BVH_Acc_Structure_Iterative_Fast_Builder.js"> </script>
		<script defer src="js/InitCommon.js"> </script>

		<script defer src="js/Home_Studio.js?v=r3-2-fix01-ui-preset"> </script>

	</body>
</html>
